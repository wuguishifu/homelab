apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: thermo-automation-secrets
  namespace: infisical-operator-system
spec:
  hostAPI: https://infisical.wuguishifu.dev/api
  syncConfig:
    resyncInterval: 60s

  authentication:
    universalAuth:
      credentialsRef:
        secretName: infisical-machine-identity
        secretNamespace: infisical-operator-system
      secretsScope:
        projectSlug: homelab
        envSlug: prod
        secretsPath: /thermo-automation
        recursive: false

  managedSecretReference:
    secretName: thermo-automation-secrets
    secretNamespace: thermo-automation
    secretType: Opaque
