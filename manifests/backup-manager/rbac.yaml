apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8s-adapter
  namespace: backup-manager
---
# Role and RoleBinding live in the databases namespace so the adapter can
# read the CronJob template and create Jobs there.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: backup-manager-k8s-adapter
  namespace: databases
rules:
  - apiGroups: ["batch"]
    resources: ["cronjobs"]
    verbs: ["get"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: backup-manager-k8s-adapter
  namespace: databases
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: backup-manager-k8s-adapter
subjects:
  - kind: ServiceAccount
    name: k8s-adapter
    namespace: backup-manager
