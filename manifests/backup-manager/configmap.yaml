apiVersion: v1
kind: ConfigMap
metadata:
  name: backup-manager-config
  namespace: backup-manager
data:
  # Bucket configuration for the backup-manager web UI.
  # Replace <r2-account-id> with your Cloudflare account ID (same value used
  # by the databases-backup jobs — visible in the Cloudflare R2 dashboard).
  config.yaml: |
    buckets:
      - name: 'Cloudflare R2 — homelab-backups'
        bucketName: 'homelab-backups'
        s3ApiUrl: 'https://a7584c846d96e5c6a29782b5b583f086.r2.cloudflarestorage.com'
        accessKeyIdName: 'R2_ACCESS_KEY_ID'
        secretAccessKeyName: 'R2_SECRET_ACCESS_KEY'
        config:
          lifecycleRules:
            - prefix: 'hourly/'
              retentionPolicy: 'delete'
              ttl: '7d'
            - prefix: 'daily/'
              retentionPolicy: 'delete'
              ttl: '90d'

      - name: 'Cloudflare R2 — secrets'
        bucketName: 'secrets'
        s3ApiUrl: 'https://a7584c846d96e5c6a29782b5b583f086.r2.cloudflarestorage.com'
        accessKeyIdName: 'SECRETS_R2_ACCESS_KEY_ID'
        secretAccessKeyName: 'SECRETS_R2_SECRET_ACCESS_KEY'
        config:
          lifecycleRules:
            - prefix: 'daily/'
              retentionPolicy: 'delete'
              ttl: '90d'

      - name: 'Amazon S3'
        bucketName: 'secrets-404688195731-us-east-2-an'
        region: 'us-east-2'
        accessKeyIdName: 'S3_ACCESS_KEY_ID'
        secretAccessKeyName: 'S3_SECRET_ACCESS_KEY'
        config:
          lifecycleRules:
            - prefix: 'daily/'
              retentionPolicy: 'delete'
              ttl: '90d'
